name: Сборка АвтоПарк EXE
on:
  push:
    branches: [main]
    paths: ['autopark/**', '.github/workflows/build-exe.yml']
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установить зависимости
        working-directory: autopark
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi==0.115.0 uvicorn[standard]==0.30.0 chromadb==0.5.0
          pip install sentence-transformers==3.0.0 pdfplumber==0.11.0
          pip install gspread==6.1.0 google-auth==2.34.0 openai==1.40.0
          pip install python-dotenv==1.0.0 python-multipart==0.0.9
          pip install pystray==0.19.5 Pillow==10.4.0 pyinstaller==6.10.0
      - name: Создать папки
        working-directory: autopark
        shell: bash
        run: mkdir -p data/pdfs data/chroma_db credentials
      - name: Собрать EXE
        working-directory: autopark
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "AutoPark" `
            --add-data "static;static" --add-data "data;data" `
            --hidden-import chromadb --hidden-import chromadb.api `
            --hidden-import chromadb.utils.embedding_functions `
            --hidden-import sentence_transformers --hidden-import transformers `
            --hidden-import torch --hidden-import fastapi --hidden-import uvicorn `
            --hidden-import uvicorn.loops.auto --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.lifespan.on --hidden-import starlette `
            --hidden-import starlette.staticfiles --hidden-import multipart `
            --hidden-import gspread --hidden-import google.auth `
            --hidden-import google.oauth2.service_account `
            --hidden-import pdfplumber --hidden-import pystray `
            --hidden-import PIL --hidden-import PIL.Image --hidden-import openai `
            --hidden-import dotenv --collect-all chromadb `
            --collect-all sentence_transformers --collect-all pdfplumber `
            --clean --noupx launcher.py
      - name: Скачать EXE
        uses: actions/upload-artifact@v4
        with:
          name: AutoPark-EXE
          path: autopark/dist/AutoPark.exe
          retention-days: 30
